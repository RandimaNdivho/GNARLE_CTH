<!-- checkout.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - GNARLIE S1</title>
  <link rel="stylesheet" href="Css/style.css">
  <link rel="stylesheet" href="Css/checkout.css">
</head>
<body>
  <header>
    <div class="logo">GNARLIE S1</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>      
      <a href="cart.html">Cart</a>
    </nav>
  </header>

  <section class="checkout">
  <h1>Checkout</h1>

  <div id="checkout-summary"></div>

  <form id="checkout-form">
    <h2>Shipping Details</h2>

    <label for="name">Full Name:</label>
    <input type="text" id="name" required>

    <label for="email">Email:</label>
    <input type="email" id="email" required>

    <label for="phone">Phone Number:</label>
    <input type="tel" id="phone" required>

    <label for="address">Street Address:</label>
    <input type="text" id="address" required>

    <label for="city">City:</label>
    <input type="text" id="city" required>

    <label for="province">Province/State:</label>
    <input type="text" id="province" required>

    <label for="postal">Postal Code:</label>
    <input type="text" id="postal" required>

    <button type="submit" class="btn">Checkout via WhatsApp</button>
  </form>

  <!-- Confirmation message (hidden by default) -->
<div id="confirmation" class="hidden">
  <h2>Order Sent!</h2>
  <p>Your order has been sent to WhatsApp. We’ll contact you soon to confirm payment and delivery.</p>
  <a href="index.html" class="btn">Return to Home</a>
</div>



  <footer class="footer-deco">
     <h3>More to Explore</h3>
      <ul>
        <li><a href="season2.html">Season 2</a></li>
        <li><a href="about.html">About</a></li>
    <p>&copy; 2026 GNARLIE. All rights reserved.</p>
  </footer>

  <script src="js/checkout.js"></script>
  <script src="js/main.js"></script>

  <!-- Google Maps Places API -->
  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places&callback=initAutocomplete" async defer></script>
</body>
</html>
